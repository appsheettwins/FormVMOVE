<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>สำรองที่นั่ง V-MOVE</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root {
  --primary-gradient: linear-gradient(135deg, #4facfe, #00f2fe);
  --primary-color: #00c853;
  --primary-dark: #00b248;
  --secondary-color: #ff6a00;
  --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
  --input-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
  --transition: all 0.3s ease;
}

body {
  font-family: 'Segoe UI', 'Kanit', system-ui, sans-serif;
  background: var(--primary-gradient);
  margin: 0;
  padding: 12px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  margin: 10px auto;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
  box-sizing: border-box;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
}

.header-title {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  position: relative;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 4px;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
  border-radius: 2px;
}

/* ส่วนแสดงชื่อ LINE สีทอง */
#lineNameDisplay {
  text-align: center;
  color: #d4af37;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 10px;
  min-height: 20px;
}

.status-badge {
  display: inline-block;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 24px;
  box-shadow: 0 4px 10px rgba(79, 172, 254, 0.3);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  font-weight: 600;
  margin-bottom: 8px;
  display: block;
  color: #333;
  font-size: 15px;
  padding-left: 4px;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 16px; 
  font-size: 16px;
  border-radius: 14px;
  border: 2px solid #e1e5e9;
  background: #f8f9fa;
  transition: var(--transition);
  box-sizing: border-box;
  font-family: inherit;
  -webkit-appearance: none;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: #4facfe;
  background: white;
  box-shadow: var(--input-shadow);
}

.btn-primary {
  margin-top: 10px;
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 16px;
  border: none;
  background: var(--primary-color);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 6px 15px rgba(0, 200, 83, 0.3);
}

.btn-secondary {
  margin-top: 10px;
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border-radius: 16px;
  border: none;
  background: var(--secondary-color);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: var(--transition);
}

.btn-primary:disabled {
  background: #ccc;
  cursor: not-allowed;
  box-shadow: none;
}

#summary {
  display: none;
  text-align: center;
}

.success {
  font-size: 24px;
  color: var(--primary-color);
  font-weight: bold;
  margin-bottom: 20px;
  padding: 24px;
  background: rgba(0, 200, 83, 0.08);
  border-radius: 20px;
}

.success::before {
  content: '✅';
  display: block;
  font-size: 20px;
  margin-bottom: 12px;
}

.summary-box {
  margin-top: 20px;
  font-size: 17px;
  line-height: 1.8;
  text-align: left;
  background: #fdfdfd;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #eee;
  border-left: 6px solid var(--primary-color);
}

.summary-box div {
    margin-bottom: 8px;
}

@media (max-width: 480px) {
  .card { padding: 20px; }
  .header-title { font-size: 20px; }
  .btn-primary { padding: 16px; }
}
</style>
</head>

<body>
<div class="card">
  <div class="header-title">
    สำรองที่นั่งกิจกรรมธรรมยาตรา
  </div>

  <div id="formPage">
    <div id="lineNameDisplay"></div>

    <div id="statusContainer" style="text-align: center;">
      <span class="status-badge">กรุณากรอกข้อมูลให้ครบถ้วน</span>
    </div>

    <div id="form">
      <div class="form-group">
        <label for="inputName">ชื่อ-นามสกุล</label>
        <input id="inputName" placeholder="ระบุชื่อและนามสกุล" oninput="checkForm()" />
      </div>

      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์</label>
        <input type="tel"
          id="phone"
          placeholder="กรอกเบอร์โทร 10 หลัก"
          inputmode="numeric"
          maxlength="10"
          oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10); checkForm();"
          required />
      </div>

      <div class="form-group">
        <label for="activity">กิจกรรม</label>
        <select id="activity" onchange="updateItems(); checkForm();">
          <option value="">-- เลือกกิจกรรม --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="item">รายการ</label>
        <select id="item" onchange="checkForm()">
          <option value="">-- เลือกรายการ --</option>
        </select>
      </div>

      <button id="saveBtn" class="btn-primary" onclick="submitForm()" disabled>
        บันทึกข้อมูล
      </button>
    </div>

    <div id="summary">
      <div class="success">
        บันทึกสำเร็จ<br>
        <span style="font-size: 16px; font-weight: normal; color: #666;">รอข้อความยืนยันสำรองที่นั่ง</span>
      </div>
      <div id="sumText" class="summary-box"></div>
      <button class="btn-secondary" onclick="resetForm()" style="margin-top: 25px;">
        เพิ่มข้อมูลใหม่
      </button>
    </div>
  </div>
</div>

<script>
const LIFF_ID = "2008940385-hkDtMTsg"; 
const GAS_URL = "https://script.google.com/macros/s/AKfycbyygVxywjy4MKAcxTmr7Idu_LPtK_AECsomy4CL_mSzom5XBZdmE8P-xDttAfAhcyxp/exec"; 

let profile = {}; 
let activities = []; 

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    profile = await liff.getProfile();
    
    // แสดงชื่อ LINE สีทอง
    if (profile.displayName) {
      document.getElementById('lineNameDisplay').innerText = "สวัสดีคุณ " + profile.displayName;
    }
    
    loadActivities();
  } catch (error) {
    console.error('LIFF init error:', error);
    loadActivities(); 
  }
}

async function loadActivities() {
  try {
    const res = await fetch(GAS_URL + "?mode=activity");
    if (res.ok) {
      activities = await res.json();
    } else {
      throw new Error();
    }

    const actSet = [...new Set(activities.map(a => a.activity))];
    const sel = document.getElementById("activity");
    while (sel.options.length > 1) sel.remove(1);

    actSet.forEach(a => {
      const o = document.createElement("option");
      o.value = o.textContent = a;
      sel.appendChild(o);
    });
  } catch (error) {
    console.error('Error loading activities:', error);
    activities = [
      { activity: "ธรรมยาตราเชียงราย", item: "รถบัสปรับอากาศ", travelTime: "08:00 น." },
      { activity: "ธรรมยาตราเชียงราย", item: "รถตู้", travelTime: "09:00 น." }
    ];
    renderBackupActivities();
  }
}

function renderBackupActivities() {
  const sel = document.getElementById("activity");
  const actSet = [...new Set(activities.map(a => a.activity))];
  actSet.forEach(a => {
    const o = document.createElement("option");
    o.value = o.textContent = a;
    sel.appendChild(o);
  });
}

function updateItems() {
  const act = document.getElementById("activity").value;
  const itemSel = document.getElementById("item");
  while (itemSel.options.length > 1) itemSel.remove(1);
  if (!act) return;

  const filteredItems = activities.filter(a => a.activity === act);
  filteredItems.forEach(a => {
    const o = document.createElement("option");
    o.value = a.item;
    o.textContent = a.item;
    itemSel.appendChild(o);
  });
}

function checkForm() {
  const inputName = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('phone').value;
  const activity = document.getElementById('activity').value;
  const item = document.getElementById('item').value;
  const ok = inputName && phone.length === 10 && activity && item;
  document.getElementById("saveBtn").disabled = !ok;
}

async function submitForm() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = "กำลังส่งข้อมูล...";

  const inputName = document.getElementById('inputName').value;
  const phone = document.getElementById('phone').value;
  const activity = document.getElementById('activity').value;
  const item = document.getElementById('item').value;
  const travelTime = activities.find(a => a.activity === activity && a.item === item)?.travelTime || "-";

  const payload = {
    userId: profile.userId || "guest",
    displayName: profile.displayName || "guest",
    inputName: inputName,
    phone: phone,
    activity: activity,
    item: item,
    travelTime: travelTime
  };

  try {

  const formData = new URLSearchParams();
  Object.keys(payload).forEach(key => {
    formData.append(key, payload[key]);
  });

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: formData.toString()
  });

  const result = await res.text();
  console.log("GAS Response:", result);

  if (!res.ok) {
    throw new Error("Server error");
  }

  // แสดงหน้าสำเร็จเหมือนเดิม
  document.getElementById('form').style.display = "none";
  document.getElementById('statusContainer').style.display = "none";
  document.getElementById('lineNameDisplay').style.display = "none";
  document.getElementById('summary').style.display = "block";
  document.getElementById('sumText').innerHTML = `
    <div><strong>😊 ชื่อ-สกุล:</strong> ${inputName}</div>
    <div><strong>📞 เบอร์โทร:</strong> ${phone}</div>
    <div><strong>🎯 กิจกรรม:</strong> ${activity}</div>
    <div><strong>📦 รายการ:</strong> ${item}</div>
    <div><strong>🕒 เวลาเดินทาง:</strong> ${travelTime}</div>
  `;

} catch (error) {
  console.error(error);
  alert('บันทึกล้มเหลว กรุณาลองใหม่อีกครั้ง');
}

function resetForm() {
  document.getElementById('inputName').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('activity').selectedIndex = 0;
  document.getElementById('item').innerHTML = '<option value="">-- เลือกรายการ --</option>';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('form').style.display = 'block';
  document.getElementById('statusContainer').style.display = 'block';
  document.getElementById('lineNameDisplay').style.display = 'block';
  document.getElementById('saveBtn').disabled = true;
}

init();
</script>
</body>
</html>
