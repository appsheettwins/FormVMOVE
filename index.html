<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>สำรองที่นั่ง V-MOVE</title>

<!-- LIFF SDK สำหรับเชื่อมต่อกับ LINE -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root {
  /* ตัวแปรสีและเอฟเฟกต์หลักสำหรับทั้งเว็บ */
  --primary-gradient: linear-gradient(135deg, #4facfe, #00f2fe);
  --primary-color: #00c853;
  --primary-dark: #00b248;
  --secondary-color: #ff6a00;
  --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
  --input-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
  --transition: all 0.3s ease;
}

body {
  font-family: 'Segoe UI', 'Kanit', system-ui, sans-serif;
  background: var(--primary-gradient);
  margin: 0;
  padding: 12px; /* ลด Padding ขอบจอ */
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* การ์ดหลักที่ครอบฟอร์มทั้งหมด */
.card {
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  max-width: 500px;
  width: 100%;
  margin: 10px auto;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
  box-sizing: border-box;
}

/* แถบสีที่ด้านบนของการ์ด */
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
}

/* หัวข้อหลัก */
.header-title {
  text-align: center;
  font-size: 22px; /* ปรับขนาดหัวข้อ */
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  position: relative;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* เส้นใต้หัวข้อ */
.header-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 4px;
  background: linear-gradient(90deg, #ff6a00, #ff2d55, #34c759);
  border-radius: 2px;
}

/* ป้ายสถานะ (แสดงเฉพาะหน้าแรก) */
.status-badge {
  display: inline-block;
  background: linear-gradient(90deg, #4facfe, #00f2fe);
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 24px;
  box-shadow: 0 4px 10px rgba(79, 172, 254, 0.3);
}

/* กลุ่มฟอร์มแต่ละช่อง */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  font-weight: 600;
  margin-bottom: 8px;
  display: block;
  color: #333;
  font-size: 15px; /* ปรับขนาด Label ให้พอดี */
  padding-left: 4px;
}

/* ปรับ Input ให้พิมพ์ง่ายบนมือถือ */
.form-group input, .form-group select {
  width: 100%;
  padding: 16px; 
  font-size: 16px; /* ป้องกัน iOS Auto-zoom */
  border-radius: 14px;
  border: 2px solid #e1e5e9;
  background: #f8f9fa;
  transition: var(--transition);
  box-sizing: border-box;
  font-family: inherit;
  -webkit-appearance: none; /* ลบสไตล์เดิมของ Safari */
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: #4facfe;
  background: white;
  box-shadow: var(--input-shadow);
}

/* ปุ่มบันทึกหลัก */
.btn-primary {
  margin-top: 10px;
  width: 100%;
  padding: 18px;
  font-size: 18px;
  border-radius: 16px;
  border: none;
  background: var(--primary-color);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 6px 15px rgba(0, 200, 83, 0.3);
}

/* ปุ่มรองสำหรับกลับไปกรอกใหม่ */
.btn-secondary {
  margin-top: 10px;
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border-radius: 16px;
  border: none;
  background: var(--secondary-color);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: var(--transition);
}

.btn-primary:disabled {
  background: #ccc;
  cursor: not-allowed;
  box-shadow: none;
}

/* ส่วนสรุปผล (ซ่อนไว้ตอนแรก) */
#summary {
  display: none;
  text-align: center;
}

.success {
  font-size: 24px;
  color: var(--primary-color);
  font-weight: bold;
  margin-bottom: 20px;
  padding: 24px;
  background: rgba(0, 200, 83, 0.08);
  border-radius: 20px;
}

.success::before {
  content: '✅';
  display: block;
  font-size: 20px;
  margin-bottom: 12px;
}

/* กล่องสรุปข้อมูล */
.summary-box {
  margin-top: 20px;
  font-size: 17px; /* ปรับขนาดสรุปผลบนมือถือ */
  line-height: 1.8;
  text-align: left;
  background: #fdfdfd;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #eee;
  border-left: 6px solid var(--primary-color);
}

.summary-box div {
    margin-bottom: 8px;
}

/* Responsive สำหรับมือถือขนาดเล็ก */
@media (max-width: 480px) {
  .card { padding: 20px; }
  .header-title { font-size: 20px; }
  .btn-primary { padding: 16px; }
}
</style>
</head>

<body>
<!-- การ์ดหลัก -->
<div class="card">

  <div class="header-title">
    สำรองที่นั่งกิจกรรมธรรมยาตรา
  </div>

  <!-- หน้าแรก: ฟอร์มกรอกข้อมูล -->
  <div id="formPage">
    <!-- แสดงสถานะปัจจุบัน -->
    <div id="statusContainer" style="text-align: center;">
      <span class="status-badge">กรุณากรอกข้อมูลให้ครบถ้วน</span>
    </div>

    <!-- ฟอร์มกรอกข้อมูล -->
    <div id="form">
      <!-- ช่องกรอกชื่อ-นามสกุล -->
      <div class="form-group">
        <label for="inputName">ชื่อ-นามสกุล</label>
        <input id="inputName" placeholder="ระบุชื่อและนามสกุล" oninput="checkForm()" />
        <!-- oninput: ตรวจสอบฟอร์มทุกครั้งที่พิมพ์ -->
      </div>

      <!-- ช่องกรอกเบอร์โทร -->
      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์</label>
        <input type="tel"
          id="phone"
          placeholder="กรอกเบอร์โทร 10 หลัก"
          inputmode="numeric"
          maxlength="10"
          oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10); checkForm();"
          required />
        <!-- อนุญาตให้พิมพ์เฉพาะตัวเลข และจำกัด 10 หลัก -->
      </div>

      <!-- Dropdown เลือกกิจกรรม -->
      <div class="form-group">
        <label for="activity">กิจกรรม</label>
        <select id="activity" onchange="updateItems(); checkForm();">
          <!-- onchange: อัปเดตรายการและตรวจสอบฟอร์มเมื่อเลือกกิจกรรม -->
          <option value="">-- เลือกกิจกรรม --</option>
        </select>
      </div>

      <!-- Dropdown เลือกรายการ -->
      <div class="form-group">
        <label for="item">รายการ</label>
        <select id="item" onchange="checkForm()">
          <!-- onchange: ตรวจสอบฟอร์มเมื่อเลือกรายการ -->
          <option value="">-- เลือกรายการ --</option>
        </select>
      </div>

      <!-- ปุ่มบันทึกข้อมูล -->
      <button id="saveBtn" class="btn-primary" onclick="submitForm()" disabled>
        บันทึกข้อมูล
      </button>
    </div>

    <!-- หน้าสรุปผล (ซ่อนไว้ตอนแรก) -->
    <div id="summary">
      <div class="success">
        บันทึกสำเร็จ<br>
        <span style="font-size: 16px; font-weight: normal; color: #666;">รอข้อความยืนยันสำรองที่นั่ง</span>
      </div>
      <div id="sumText" class="summary-box"></div>
      <button class="btn-secondary" onclick="resetForm()" style="margin-top: 25px;">
        เพิ่มข้อมูลใหม่
      </button>
    </div>
  </div>

</div>

<script>
// **********************************************
// ค่าคงที่สำคัญ
// **********************************************
const LIFF_ID = "2008940385-hkDtMTsg"; // ID สำหรับ LINE LIFF App
const GAS_URL = "https://script.google.com/macros/s/AKfycbyygVxywjy4MKAcxTmr7Idu_LPtK_AECsomy4CL_mSzom5XBZdmE8P-xDttAfAhcyxp/exec"; // URL ของ Google Apps Script สำหรับเก็บข้อมูล

// ตัวแปร global
let profile = {}; // เก็บข้อมูลโปรไฟล์จาก LINE
let activities = []; // เก็บข้อมูลกิจกรรมทั้งหมด

// **********************************************
// ฟังก์ชัน init()
// หน้าที่: เริ่มต้น LIFF และดึงข้อมูลโปรไฟล์ผู้ใช้
// **********************************************
async function init() {
  try {
    // เริ่มต้น LIFF ด้วย ID ที่กำหนด
    await liff.init({ liffId: LIFF_ID });
    
    // ตรวจสอบว่าผู้ใช้ล็อกอินใน LINE หรือไม่
    if (!liff.isLoggedIn()) {
      liff.login(); // ถ้ายังไม่ล็อกอินให้ redirect ไปหน้า login
      return;
    }
    
    // ดึงข้อมูลโปรไฟล์ผู้ใช้จาก LINE
    profile = await liff.getProfile();
    
    // โหลดข้อมูลกิจกรรมจากฐานข้อมูล
    loadActivities();
  } catch (error) {
    console.error('LIFF init error:', error);
    loadActivities(); // โหลดข้อมูลแม้จะไม่ได้เปิดใน LINE
  }
}

// **********************************************
// ฟังก์ชัน loadActivities()
// หน้าที่: โหลดข้อมูลกิจกรรมจาก Google Apps Script
// **********************************************
async function loadActivities() {
  try {
    // ส่ง request ไปยัง GAS เพื่อดึงข้อมูลกิจกรรม
    const res = await fetch(GAS_URL + "?mode=activity");
    if (res.ok) {
      activities = await res.json(); // แปลงข้อมูลเป็น JSON
    } else {
      throw new Error(); // ถ้า request ไม่สำเร็จให้โยน error
    }

    // ดึงกิจกรรมที่ไม่ซ้ำกันจากข้อมูลทั้งหมด
    const actSet = [...new Set(activities.map(a => a.activity))];
    const sel = document.getElementById("activity");
    
    // ล้าง options เดิม (เหลือแค่ option แรก)
    while (sel.options.length > 1) sel.remove(1);

    // เพิ่มกิจกรรมแต่ละตัวเข้าไปใน dropdown
    actSet.forEach(a => {
      const o = document.createElement("option");
      o.value = o.textContent = a;
      sel.appendChild(o);
    });
  } catch (error) {
    console.error('Error loading activities:', error);
    // ข้อมูลสำรองกรณีเชื่อมต่อ Database ไม่ได้
    activities = [
      { activity: "ธรรมยาตราเชียงราย", item: "รถบัสปรับอากาศ", travelTime: "08:00 น." },
      { activity: "ธรรมยาตราเชียงราย", item: "รถตู้", travelTime: "09:00 น." }
    ];
    renderBackupActivities();
  }
}

// **********************************************
// ฟังก์ชัน renderBackupActivities()
// หน้าที่: แสดงข้อมูลกิจกรรมสำรองเมื่อเชื่อมต่อฐานข้อมูลไม่ได้
// **********************************************
function renderBackupActivities() {
  const sel = document.getElementById("activity");
  const actSet = [...new Set(activities.map(a => a.activity))];
  actSet.forEach(a => {
    const o = document.createElement("option");
    o.value = o.textContent = a;
    sel.appendChild(o);
  });
}

// **********************************************
// ฟังก์ชัน updateItems()
// หน้าที่: อัปเดตรายการ (item) ตามกิจกรรมที่เลือก
// **********************************************
function updateItems() {
  // ดึงค่ากิจกรรมที่ผู้ใช้เลือก
  const act = document.getElementById("activity").value;
  const itemSel = document.getElementById("item");
  
  // ล้างรายการเดิม (เหลือแค่ option แรก)
  while (itemSel.options.length > 1) itemSel.remove(1);
  if (!act) return; // ถ้ายังไม่ได้เลือกกิจกรรม ให้หยุดทำงาน

  // กรองเฉพาะรายการที่เกี่ยวข้องกับกิจกรรมที่เลือก
  const filteredItems = activities.filter(a => a.activity === act);
  
  // เพิ่มรายการแต่ละตัวเข้าไปใน dropdown
  filteredItems.forEach(a => {
    const o = document.createElement("option");
    o.value = a.item;
    o.textContent = a.item;
    itemSel.appendChild(o);
  });
}

// **********************************************
// ฟังก์ชัน checkForm()
// หน้าที่: ตรวจสอบความครบถ้วนของฟอร์ม
// **********************************************
function checkForm() {
  // ดึงค่าจากแต่ละฟิลด์ในฟอร์ม
  const inputName = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('phone').value;
  const activity = document.getElementById('activity').value;
  const item = document.getElementById('item').value;
  
  // ตรวจสอบว่าทุกช่องกรอกครบถ้วน (เบอร์โทรต้อง 10 หลัก)
  const ok = inputName && phone.length === 10 && activity && item;
  
  // เปิด/ปิดปุ่มบันทึกตามความครบถ้วนของฟอร์ม
  document.getElementById("saveBtn").disabled = !ok;
}

// **********************************************
// ฟังก์ชัน submitForm()
// หน้าที่: ส่งข้อมูลฟอร์มไปยัง Google Apps Script
// **********************************************
async function submitForm() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = "กำลังส่งข้อมูล...";

  const inputName = document.getElementById('inputName').value;
  const phone = document.getElementById('phone').value;
  const activity = document.getElementById('activity').value;
  const item = document.getElementById('item').value;
  
  const travelTime = activities.find(a => a.activity === activity && a.item === item)?.travelTime || "-";

  const payload = {
    userId: profile.userId || "guest",
    displayName: profile.displayName || "guest",
    inputName: inputName, // ต้องใช้ชื่อนี้ให้ตรงกับ doPost
    phone: phone,
    activity: activity,
    item: item,
    travelTime: travelTime
  };

  try {
    // แก้ไข: ห้ามใส่ mode: 'no-cors' เพราะจะทำให้ส่งข้อมูล (Payload) ไปไม่ถึง ChatLog
    const response = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(payload) 
    });

    // แสดงผลหน้าสำเร็จ...
    document.getElementById('form').style.display = "none";
    document.getElementById('statusContainer').style.display = "none";
    document.getElementById('summary').style.display = "block";
    document.getElementById('sumText').innerHTML = `
      <div><strong>😊 ชื่อ-สกุล:</strong> ${inputName}</div>
      <div><strong>📞 เบอร์โทร:</strong> ${phone}</div>
      <div><strong>🎯 กิจกรรม:</strong> ${activity}</div>
      <div><strong>📦 รายการ:</strong> ${item}</div>
      <div><strong>🕒 เวลาเดินทาง:</strong> ${travelTime}</div>
    `;
  } catch (error) {
    console.error(error);
    alert('บันทึกล้มเหลว');
  } finally {
    btn.disabled = false;
    btn.textContent = "บันทึกข้อมูล";
  }
}

// **********************************************
// ฟังก์ชัน resetForm()
// หน้าที่: รีเซ็ตฟอร์มเพื่อกรอกข้อมูลใหม่
// **********************************************
function resetForm() {
  // ล้างค่าทุกฟิลด์ในฟอร์ม
  document.getElementById('inputName').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('activity').selectedIndex = 0; // กลับไปที่ตัวเลือกแรก
  document.getElementById('item').innerHTML = '<option value="">-- เลือกรายการ --</option>'; // ล้างรายการ
  
  // ซ่อนหน้าสรุปผล
  document.getElementById('summary').style.display = 'none';
  
  // แสดงฟอร์มและป้ายสถานะ
  document.getElementById('form').style.display = 'block';
  document.getElementById('statusContainer').style.display = 'block';
  
  // ปิดปุ่มบันทึก (รอให้กรอกข้อมูลครบ)
  document.getElementById('saveBtn').disabled = true;
}

// เรียกฟังก์ชัน init() เมื่อโหลดหน้าเว็บเสร็จ
init();
</script>
</body>
</html>
